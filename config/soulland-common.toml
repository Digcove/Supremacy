
#Soul Land Mod Configuration
[general]

	#Beast Spawning Settings
	[general.spawning]
		#Spawn weight for normal spirit beasts (higher = more common)
		#Range: 1 ~ 100
		beast_spawn_weight = 8
		#Spawn weight for boss spirit beasts
		#Range: 0 ~ 50
		boss_spawn_weight = 1
		#Maximum spirit beasts per chunk
		#Range: 1 ~ 20
		max_beasts_per_chunk = 4

	#Cultivation Settings
	[general.cultivation]
		#Multiplier for cultivation speed (1.0 = normal)
		#Range: 0.1 ~ 10.0
		cultivation_speed = 1.0
		#Multiplier for meditation cultivation speed
		#Range: 0.5 ~ 20.0
		meditation_speed = 2.0
		#Keep cultivation progress on death
		keep_on_death = true
		#Maximum innate soul power talent (1-20)
		#Range: 1 ~ 100
		max_innate_talent = 20

	#Ring Absorption Settings
	[general.rings]
		#Time in ticks to absorb a soul ring (20 ticks = 1 second)
		#Range: 20 ~ 6000
		absorb_time = 200
		#Enforce strict age requirements for ring slots
		strict_age_requirements = true

	#Combat Settings
	[general.combat]
		#Multiplier for skill damage
		#Range: 0.1 ~ 10.0
		skill_damage_multiplier = 1.0
		#Spirit power regeneration rate per tick
		#Range: 0.0 ~ 10.0
		spirit_regen_rate = 0.5

	#HUD Settings
	[general.hud]
		#Show cultivation HUD overlay
		show_hud = true
		#HUD X position offset from top-left
		#Range: 0 ~ 1000
		hud_x = 5
		#HUD Y position offset from top-left
		#Range: 0 ~ 1000
		hud_y = 5

	#Skill Cast Cinematic Settings (v62)
	[general.cinematic]
		#Overall cinematic intensity preset.
		#  0 = OFF (no beast phantom, no bonus layers)
		#  1 = SUBTLE (phantom only, no tier bonuses or signature beasts)
		#  2 = NORMAL (default — phantom + element trails + tier bonuses)
		#  3 = EXTREME (all layers + camera shake + larger phantoms)
		#Range: 0 ~ 3
		intensity = 2
		#Show cinematic when you cast a skill (yourself).
		#Set false if cinematics ever block your view during combat.
		show_own_cinematic = true
		#Show cinematic when other players cast skills.
		#Set false to reduce clutter in busy PvP areas.
		show_others_cinematic = true
		#Hide your own cinematic while in F1 first-person view.
		#Recommended ON since the phantom can appear in front of camera.
		hide_in_first_person = true
		#Auto-disable cinematic when below low_health_threshold HP.
		#Lets damage feedback come through cleanly in emergencies.
		hide_at_low_health = true
		#Health fraction below which cinematic auto-disables (e.g. 0.3 = 30%).
		#Range: 0.0 ~ 1.0
		low_health_threshold = 0.3
		#Multiplier on cinematic duration. Default 1.0 = 1.5 seconds.
		#Drop to 0.5 for snappier cinematics.
		#Range: 0.25 ~ 3.0
		duration_scale = 1.0
		#Multiplier on phantom size. Default 1.0.
		#Drop to 0.6 if phantoms feel too large or block your view.
		#Range: 0.3 ~ 2.0
		size_scale = 1.0
		#Camera shake on Gold/mutated ring casts. Cosmetic only.
		camera_shake = true
		#Maximum distance (blocks) to render OTHER players' cinematics.
		#Beyond this distance, cinematics are culled for performance.
		#Range: 0.0 ~ 256.0
		max_distance = 32.0
		#Maximum simultaneous cinematics across all tracked players.
		#If exceeded, the oldest active cast is dropped to limit GPU load.
		#Range: 1 ~ 64
		queue_max = 8
		#Mute predator-archetype cinematics (tiger, wolf, lion lunges).
		mute_predator = false
		#Mute avian-archetype cinematics (phoenix, eagle wing-beats).
		mute_avian = false
		#Mute serpent-archetype cinematics (dragon, python coils). Useful if coil motion feels dizzying.
		mute_serpent = false
		#Mute aquatic-archetype cinematics (kraken, whale emerges).
		mute_aquatic = false
		#Mute tool-spirit cinematics (hammer/sword/scythe swings).
		mute_tool = false
		#Mute body-spirit cinematics (divine body aura, steel body).
		mute_body = false
		#Mute divine/special cinematics (seraph wings, dragon-god halos).
		mute_divine = false
		#ADMIN/SERVER ONLY: when true, ops can force-disable cinematics for everyone (for performance, events, recordings). Toggled via /soulland cinematic server <on|off>.
		server_disable = false

