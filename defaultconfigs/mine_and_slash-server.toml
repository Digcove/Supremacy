	REMOVE_ATK_SPEED_COOLDOWN = true
	#Range: 0 ~ 10000000
	MAP_START_COOLDOWN_SECONDS = 120
	#Range: 0.0 ~ 1000.0
	MAP_DROPRATE = 0.5
