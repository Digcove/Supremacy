	#Distance needed from player to despawn mobs in maps, lower means more despawning
	#Range: 5.0 ~ 200.0
	MOB_DESPAWN_DISTANCE_IN_MAPS = 30.0
	#Range: 5.0 ~ 99.0
	MAP_PERCENT_COMPLETE_NEEDED_FOR_BOSS_ARENA = 30.0
	#Mobs that are much higher level will hide their levels.
	SKULL_HIDES_LEVEL = true
	#When mobs are this many levels higher than you, a skull will show, indicating danger.
	#Range: 1 ~ 1000
	SHOW_SKULL_ON_MOBS_THAT_ARE_X_LEVELS_HIGHER_THAN_YOU = 10
	SCALE_MOB_LEVEL_TO_NEAREST_PLAYER = true
	#Items protected from accidental soul-cleaning. Soul Land milestone armor and divine paths are permanently protected.
	SOUL_CLEANER_ITEM_BLACKLIST = [
